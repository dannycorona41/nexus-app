*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080f;color:#c8cbf0;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0d0f1e}
::-webkit-scrollbar-thumb{background:#252848;border-radius:2px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ticker-wrap{animation:ticker 55s linear infinite;display:flex;gap:32px;white-space:nowrap}
.spin{animation:spin 1s linear infinite;display:inline-block}
.pulse{animation:pulse 2s ease-in-out infinite}
.fade{animation:fadeIn .25s ease}
button,input,textarea{font-family:'Inter',sans-serif}
input:focus,textarea:focus{outline:none}
@keyframes tradeFlash{0%{background:rgba(0,214,143,.35)}100%{background:transparent}}
@keyframes tradeFlashRed{0%{background:rgba(240,71,106,.35)}100%{background:transparent}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
@keyframes signalPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px #4f8eff88}}
@keyframes tpFlash{0%{box-shadow:0 0 0 0 #00d68f88}70%{box-shadow:0 0 0 16px transparent}100%{box-shadow:none}}
.trade-flash{animation:tradeFlash .9s ease forwards}
.trade-flash-red{animation:tradeFlashRed .9s ease forwards}
.signal-pulse{animation:signalPulse 1.2s ease 3}
.tp-ring{animation:tpFlash .8s ease}
</style>

  var root = document.getElementById('root');

  var srcShort = src ? src.split('/').slice(-2).join('/') : 'unknown';
  console.error('NEXUS ERROR:', msg, '\nSource:', src, '\nLine:', line, '\nStack:', err && err.stack);

};
</script>

    return { hiIdx, loIdx, hi: highs[hiIdx], lo: lows[loIdx] };

  function buildCandles(closes, seed = 1) {

    const r = () => { rnd = (rnd * 9301 + 49297) % 233280; return rnd / 233280; };
    for (let i = 0; i < closes.length; i++) {
      const close = closes[i];
      const open = i > 0 ? closes[i - 1] : close;
      const bodyMid = (open + close) / 2;
      const bodyHalf = Math.abs(close - open) / 2;

      const high = Math.max(open, close) + wickBase * (0.4 + r() * 0.8);
      const low  = Math.min(open, close) - wickBase * (0.4 + r() * 0.8);
      out.push({ t: i * 86400000, open, high, low, close });
    }
